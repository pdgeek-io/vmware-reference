<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pdgeek.io — Self-Service VM Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: linear-gradient(135deg, #0076CE, #00447C); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 1.8em; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .card h3 { color: #0076CE; margin-bottom: 8px; }
        .card .specs { font-size: 0.85em; color: #666; margin: 12px 0; }
        .card .specs span { display: inline-block; background: #f0f7ff; padding: 3px 8px; border-radius: 4px; margin: 2px; }
        .btn { background: #0076CE; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.95em; width: 100%; }
        .btn:hover { background: #005fa3; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; max-width: 450px; margin: 10% auto; padding: 30px; border-radius: 10px; }
        .modal-content h2 { margin-bottom: 20px; color: #0076CE; }
        .modal-content input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95em; }
        .modal-content .btn { margin-top: 15px; }
        .status { text-align: center; padding: 20px; margin-top: 20px; border-radius: 10px; display: none; }
        .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
        .footer { text-align: center; padding: 30px; color: #999; font-size: 0.85em; }
        .footer a { color: #0076CE; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>pdgeek.io — Self-Service VM Portal</h1>
        <p>PowerEdge | PowerStore | VMware VVF/VCF</p>
    </div>

    <div class="container">
        <h2 style="margin-bottom: 20px; color: #333;">VM Catalog</h2>
        <div class="catalog" id="catalog"></div>
        <div class="status" id="status"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Deploy VM</h2>
            <p id="modal-desc"></p>
            <input type="hidden" id="catalog-id">
            <input type="text" id="vm-name" placeholder="VM Name (e.g., dev-web-01)">
            <input type="text" id="vm-ip" placeholder="IP Address (e.g., 10.0.200.50)">
            <button class="btn" onclick="deployVM()">Deploy</button>
            <button class="btn" style="background: #999; margin-top: 8px;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <div class="footer">
        <a href="https://pdgeek.io">pdgeek.io</a> — Open-source VMware reference architecture
    </div>

    <script>
        async function loadCatalog() {
            const resp = await fetch('/api/v1/catalog');
            const data = await resp.json();
            const container = document.getElementById('catalog');
            container.innerHTML = data.catalog.map(item => `
                <div class="card" onclick="openModal('${item.id}', '${item.name}')">
                    <h3>${item.name}</h3>
                    <p>${item.description}</p>
                    <div class="specs">
                        ${item.compute ? `<span>${item.compute.cpu} vCPU</span><span>${item.compute.memory_mb} MB</span><span>${item.storage?.os_disk_gb} GB</span>` : ''}
                    </div>
                    <button class="btn">Deploy</button>
                </div>
            `).join('');
        }

        function openModal(id, name) {
            document.getElementById('catalog-id').value = id;
            document.getElementById('modal-desc').textContent = `Deploying: ${name}`;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function deployVM() {
            const body = {
                name: document.getElementById('vm-name').value,
                catalog_item: document.getElementById('catalog-id').value,
                ip_address: document.getElementById('vm-ip').value,
            };
            const resp = await fetch('/api/v1/vms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const data = await resp.json();
            closeModal();
            const status = document.getElementById('status');
            status.className = 'status success';
            status.textContent = data.message;
        }

        loadCatalog();
    </script>
</body>
</html>
