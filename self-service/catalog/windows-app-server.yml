# Windows App Server — .NET runtime for campus applications
name: Windows App Server
description: Windows Server 2022 + .NET 8 Runtime — 4 vCPU, 16 GB RAM, 100 GB disk
template: tpl-windows-2022
os_family: windows

compute:
  cpu: 4
  memory_mb: 16384

storage:
  os_disk_gb: 100
  data_disks: []

network:
  port_group: DPG-Workload

resource_pool: Production
folder: Reference-VMs/App

post_deploy:
  ansible_playbook: ansible/playbooks/app-deploy-dotnet.yml
