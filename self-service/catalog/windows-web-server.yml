# Windows Web Server — IIS for higher ed web applications
name: Windows Web Server
description: Windows Server 2022 + IIS — 4 vCPU, 8 GB RAM, 100 GB disk
template: tpl-windows-2022
os_family: windows

compute:
  cpu: 4
  memory_mb: 8192

storage:
  os_disk_gb: 100
  data_disks: []

network:
  port_group: DPG-Workload

resource_pool: Production
folder: Reference-VMs/Web

post_deploy:
  ansible_playbook: ansible/playbooks/app-deploy-iis.yml
